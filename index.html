<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README Gen Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full text-center">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">README Gen Pro</h1>
        <p class="text-lg text-gray-600 mb-6">Generate professional READMEs in seconds.</p>
        <form action="#" method="POST">
            <div class="mb-4">
                <input type="url" id="repoUrl" name="repoUrl" placeholder="GitHub Repository URL" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200">
                Generate README - Buy for $9.99
            </button>
        </form>
        <p class="text-xs text-gray-400 mt-6">Secured by Stripe</p>
    </div>
</body>
</html>
